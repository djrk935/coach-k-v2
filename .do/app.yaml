# DigitalOcean App Platform — import or edit in the control panel.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# After deploy: open the app URL, enter APP_PASSWORD, use the web UI or point
# the iOS app at the same HTTPS URL + password (Settings).

name: coach-k
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: djrk935/coach-k-v2
      branch: main
      deploy_on_push: true
    http_port: 8080
    instance_count: 1
    # 2 GB recommended — local embeddings + agent; 1 GB may OOM on cold start.
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /api/health
      initial_delay_seconds: 90
      period_seconds: 30
      timeout_seconds: 10
      failure_threshold: 5
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: APP_PASSWORD
        scope: RUN_TIME
        type: SECRET

databases:
  - name: db
    engine: PG
    version: "16"
    # Dev database — cheapest managed-Postgres tier, plenty for a single athlete.
    # Supports pgvector; the app runs CREATE EXTENSION IF NOT EXISTS vector on boot.
    production: false
