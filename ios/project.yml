name: CoachK
options:
  bundleIdPrefix: com.dayan
  deploymentTarget:
    iOS: "17.0"
targets:
  CoachK:
    type: application
    platform: iOS
    sources: [CoachK]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayan.coachk
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    entitlements:
      path: CoachK/CoachK.entitlements
      properties:
        com.apple.developer.healthkit: true
        aps-environment: development
    info:
      path: CoachK/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes: [remote-notification]
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSSpeechRecognitionUsageDescription: Coach K transcribes your voice to log sets hands-free.
        NSMicrophoneUsageDescription: Coach K listens so you can log sets by voice mid-workout.
        NSCameraUsageDescription: Coach K uses the camera so you can film a set for form check.
        NSPhotoLibraryUsageDescription: Coach K reads a short clip you pick so it can check your form.
        NSHealthShareUsageDescription: Coach K reads your sleep, HRV, and resting heart rate to gauge recovery and adjust your training.
