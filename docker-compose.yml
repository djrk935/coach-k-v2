# One-box deployment (e.g. a DigitalOcean droplet):
#   docker compose up -d --build
# Postgres runs the migration automatically on first boot (initdb.d mount).
services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: coachk
    volumes:
      - dbdata:/var/lib/postgresql/data
      # Schema is applied by the app on startup (app/migrate.py) — avoids
      # double-running SQL when initdb.d and the app both migrate.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coachk"]
      interval: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      DATABASE_URL: postgresql://coach:${POSTGRES_PASSWORD}@db:5432/coachk
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set in .env}
      LLAMA_CLOUD_API_KEY: ${LLAMA_CLOUD_API_KEY:-}
      APP_PASSWORD: ${APP_PASSWORD:?set in .env}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:coach@coach-k.local}
    volumes:
      - photos:/srv/photos
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
  photos:
